name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps (runtime + dev)
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  container-scan:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t herd-manager:ci .
      - name: Scan (Trivy)
        uses: aquasecurity/trivy-action@0.14.0
        with:
          image-ref: herd-manager:ci
          format: 'table'
          exit-code: '0'
